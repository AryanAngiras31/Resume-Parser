version: "3.8"
services:
  resume-api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      # This volume maps the HuggingFace cache so Marker doesn't re-download
      # its 2GB of OCR models every time you restart the container
      - huggingface_cache:/root/.cache/huggingface

volumes:
  huggingface_cache:
